<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: #f8f9fa;
    color: #333;
  }
  .header {
    background: #2c3e50;
    display: flex;
    align-items: center;
    padding: 16px 24px;
    gap: 16px;
  }
  .header img {
    height: 36px;
    width: auto;
  }
  .header span {
    color: #ecf0f1;
    font-size: 18px;
    font-weight: 600;
  }
  main {
    max-width: 900px;
    margin: 40px auto;
    padding: 0 24px;
  }
  h1 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 8px; }
  h2 { color: #34495e; margin-top: 32px; }
  table { width: 100%; border-collapse: collapse; margin: 16px 0; }
  th, td { text-align: left; padding: 10px 14px; border-bottom: 1px solid #dee2e6; }
  th { background: #f1f3f5; color: #495057; font-weight: 600; }
  a { color: #2980b9; }
  footer { text-align: center; padding: 32px; color: #7f8c8d; font-size: 13px; }
</style>

<div class="header">
  <img src="/assets/images/logo.png" alt="OSK Logo">
  <span>{{ site.title }}</span>
</div>

{% include nav.html %}

<main>
  {{ content }}
</main>

<footer>
  &copy; {{ "now" | date: "%Y" }} Open Source Kingdom
</footer>
